
name: CI

on:
  push:
    branches: [ "main", "Testing" ]
  pull_request:
    branches: [ "main", "Testing" ]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore dependencies
        run: dotnet restore
        working-directory: LibroManager
      - name: Build
        run: dotnet build --no-restore
        working-directory: LibroManager
      - name: Test (Unit)
        run: dotnet test --no-build --verbosity normal LibroManager.Tests.Unit/LibroManager.Tests.Unit.csproj

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore dependencies
        run: dotnet restore
        working-directory: LibroManager
      - name: Build
        run: dotnet build --no-restore
        working-directory: LibroManager
      - name: Install Playwright CLI
        run: dotnet tool install --global Microsoft.Playwright.CLI
      - name: Install Playwright Browser (Chromium only)
        run: playwright install chromium
        working-directory: LibroManager.Tests.E2E
      - name: Test (E2E)
        run: dotnet test --no-build --verbosity normal LibroManager.Tests.E2E/LibroManager.Tests.E2E.csproj
      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            LibroManager.Tests.E2E/**/Diff/*.png
            LibroManager.Tests.E2E/**/Actual/*.png
            LibroManager.Tests.E2E/**/Golden/*.png
            LibroManager.Tests.E2E/Reports/*
